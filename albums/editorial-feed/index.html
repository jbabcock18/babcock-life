<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moving Wall | Jack Babcock</title>
    <meta name="description" content="A moving wall of photos by Jack Babcock." />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" aria-label="Primary">
        <nav class="sidebar__nav">
          <a class="sidebar__link" href="../../index.html">about</a>
          <a class="sidebar__link" href="../../projects.html">projects</a>
          <a class="sidebar__link" href="../../notes.html">notes</a>
          <a class="sidebar__link is-active" href="../../albums.html" aria-current="page">albums</a>
        </nav>
      </aside>

      <main class="content content--wall">
        <a class="album-back" href="../../albums.html">back to albums</a>

        <header class="page__header">
          <h1>Moving Wall</h1>
          <p>Photos drifting in opposite directions.</p>
        </header>

        <section class="wall-page" aria-label="Moving wall of photos">
          <div class="wall-marquee">
            <div class="wall-column">
              <div class="wall-track wall-track--up">
                <div class="wall-stack">
                  <figure class="wall-tile wall-tile--tall">
                    <img src="../3rd%20person/photos/cinque-terre.jpeg" alt="Cinque Terre" />
                  </figure>
                  <figure class="wall-tile wall-tile--square">
                    <img src="../3rd%20person/photos/florence.jpeg" alt="Florence" />
                  </figure>
                  <figure class="wall-tile">
                    <img src="../Cats/photos/sardinia.jpeg" alt="Sardinia cat" />
                  </figure>
                  <figure class="wall-tile wall-tile--tall">
                    <img src="../../pics/newport.jpeg" alt="Newport" />
                  </figure>
                  <figure class="wall-tile wall-tile--square">
                    <img src="../3rd%20person/photos/norway-11.jpeg" alt="Norway" />
                  </figure>
                </div>
                <div class="wall-stack" aria-hidden="true">
                  <figure class="wall-tile wall-tile--tall">
                    <img src="../3rd%20person/photos/cinque-terre.jpeg" alt="" />
                  </figure>
                  <figure class="wall-tile wall-tile--square">
                    <img src="../3rd%20person/photos/florence.jpeg" alt="" />
                  </figure>
                  <figure class="wall-tile">
                    <img src="../Cats/photos/sardinia.jpeg" alt="" />
                  </figure>
                  <figure class="wall-tile wall-tile--tall">
                    <img src="../../pics/newport.jpeg" alt="" />
                  </figure>
                  <figure class="wall-tile wall-tile--square">
                    <img src="../3rd%20person/photos/norway-11.jpeg" alt="" />
                  </figure>
                </div>
              </div>
            </div>

            <div class="wall-column">
              <div class="wall-track wall-track--down">
                <div class="wall-stack">
                  <figure class="wall-tile wall-tile--square">
                    <img src="../3rd%20person/photos/italy-4.jpeg" alt="Italy" />
                  </figure>
                  <figure class="wall-tile wall-tile--tall">
                    <img src="../3rd%20person/photos/austin.jpeg" alt="Austin" />
                  </figure>
                  <figure class="wall-tile">
                    <img src="../../pics/switzerland.jpeg" alt="Switzerland" />
                  </figure>
                  <figure class="wall-tile wall-tile--square">
                    <img src="../3rd%20person/photos/sweden.jpeg" alt="Sweden" />
                  </figure>
                  <figure class="wall-tile wall-tile--tall">
                    <img src="../Cats/photos/sardinia-2.jpeg" alt="Sardinia cat two" />
                  </figure>
                </div>
                <div class="wall-stack" aria-hidden="true">
                  <figure class="wall-tile wall-tile--square">
                    <img src="../3rd%20person/photos/italy-4.jpeg" alt="" />
                  </figure>
                  <figure class="wall-tile wall-tile--tall">
                    <img src="../3rd%20person/photos/austin.jpeg" alt="" />
                  </figure>
                  <figure class="wall-tile">
                    <img src="../../pics/switzerland.jpeg" alt="" />
                  </figure>
                  <figure class="wall-tile wall-tile--square">
                    <img src="../3rd%20person/photos/sweden.jpeg" alt="" />
                  </figure>
                  <figure class="wall-tile wall-tile--tall">
                    <img src="../Cats/photos/sardinia-2.jpeg" alt="" />
                  </figure>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
